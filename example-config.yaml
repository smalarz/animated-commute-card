# ============================================
# Animated Commute Card - Przykładowa konfiguracja
# ============================================

# INSTALACJA:
# 1. Skopiuj animated-commute-card.js do /config/www/
# 2. Dodaj zasób w Settings → Dashboards → Resources:
#    URL: /local/animated-commute-card.js
#    Type: JavaScript Module
# 3. Odśwież przeglądarkę (Ctrl+Shift+R)

# ============================================
# PODSTAWOWA KONFIGURACJA
# ============================================

type: custom:animated-commute-card
entity_to_work: sensor.do_pracy
entity_to_home: sensor.z_pracy_do_domu
routes:
  - entity: sensor.do_pracy
    name: Do pracy
    icon: work
    map_url: "https://maps.app.goo.gl/h4t5vq4gEycNbSCU9"
  - entity: sensor.z_pracy_do_domu
    name: Do domu
    icon: home
    map_url: "https://maps.app.goo.gl/AVtKpzMuA6YZ4igB7"

