# ============================================
# FEATURES:
# ============================================
# ✅ Dynamiczne tło (rano/dzień/wieczór/noc) na podstawie sun.sun
# ✅ Animowana droga z jadącymi samochodami
# ✅ Pływające chmury (dzień) / migające gwiazdy (noc)
# ✅ Sygnalizator świetlny (zielony/żółty/czerwony)
# ✅ Kolorowanie czasu (zielony/żółty/czerwony + pulsowanie)
# ✅ ⚠️ przy czasie > 59 min
# ✅ Wskaźnik ruchu (mały/umiarkowany/duży/bardzo duży)
# ✅ Internacjonalizacja (PL/EN/DE)
# ✅ Visual Editor w HA
# ✅ HACS compatible
# ✅ Klikalne trasy – otwieranie mapy (Google Maps, Waze, itp.) po kliknięciu
